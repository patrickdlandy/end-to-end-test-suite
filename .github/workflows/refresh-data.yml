name: refresh-data

# Keep the vendored vulnerability/tracker datasets current while remaining
# reproducible between runs. Opens a PR when the data changes.
on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh vendored datasets
        run: node scripts/refresh-data.mjs

      - name: Open PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh vendored vuln/tracker datasets"
          title: "chore: refresh vendored vuln/tracker datasets"
          body: Automated weekly refresh of the retire.js and Disconnect datasets.
          branch: chore/refresh-data
          add-paths: src/data/*.json
