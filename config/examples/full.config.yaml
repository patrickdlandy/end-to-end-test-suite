version: 1
defaults:
  categories: [security, privacy, performance, accessibility, seo, best-practices]
  runs: 1 # keep the example fast; raise to 3+ for real audits
  budgets:
    performance: { score: 0.5, lcpMs: 8000, cls: 0.5, tbtMs: 2000 }
    accessibility: { maxCritical: 0, maxSerious: 5 }
    security:
      requiredHeaders: [content-security-policy, x-content-type-options]
      minTlsVersion: "1.2"
      certMinDaysToExpiry: 14
      maxVulnLibs: 0
    privacy:
      maxThirdPartyTrackers: 10
      maxThirdPartyCookies: 5
      requireConsentBanner: false
targets:
  - url: https://github.com/
ci:
  failOn: [error]
  reporters: [json, terminal]
